version: 1

dataset:
  name: "Python Comment Evolution Dataset"
  description: >
    Repositories selected for a study of Python commenting practices
    across two time periods.
  theme: "cli-tools"
  groups:
    old_2000s:
      label: "2000s"
      start_year: 2000
      end_year: 2009
    new_2020s:
      label: "2020s"
      start_year: 2020
      end_year: 2029

repos:
  - name: "pip"
    url: "https://github.com/pypa/pip"
    group: "old_2000s"
    release: "1.0.1"
  - name: "virtualenv"
    url: "https://pypi.org/project/virtualenv/"
    group: "old_2000s"
    release: "1.4"
    notes: "There is no known version control that goes back to 1.4, only the release on PyPI. Some source files in the release are compressed, so we will have to uncompress them"
  - name: "setuptools"
    url: "https://pypi.org/project/setuptools/"
    group: "old_2000s"
    release: "0.6c11"

